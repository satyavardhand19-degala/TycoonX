<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#CC4400"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFD580"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Coin body -->
  <circle cx="50" cy="50" r="38" fill="url(#coinGrad)" filter="url(#shadow)"/>

  <!-- Inner coin highlight ring -->
  <circle cx="50" cy="50" r="33" fill="none" stroke="#FFAA33" stroke-width="1.5" opacity="0.5"/>

  <!-- Crown shape above TX -->
  <path d="M34 36 L38 28 L42 34 L50 24 L58 34 L62 28 L66 36 Z"
        fill="#FFD580" opacity="0.95" filter="url(#glow)"/>
  <rect x="33" y="35" width="34" height="5" rx="2" fill="#FFD580" opacity="0.9"/>

  <!-- TX text -->
  <text x="50" y="68"
        text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="26"
        fill="url(#textGrad)"
        letter-spacing="-1">TX</text>
</svg>
